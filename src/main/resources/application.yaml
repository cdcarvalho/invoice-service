spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/invoices
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      name: invoiceJob
